<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>OnlyOffice Editor</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    #editor {
      width: 100%;
      height: 100%;
    }
  </style>

  <script src="http://localhost:8080/web-apps/apps/api/documents/api.js"></script>
</head>

<body>
  <div id="editor"></div>

  <script>
    const config = JSON.parse(localStorage.getItem("onlyofficeConfig"));
    new DocsAPI.DocEditor("editor", config);
  </script>
</body>
</html>
